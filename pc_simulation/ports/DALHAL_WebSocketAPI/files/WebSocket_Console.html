<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalhalla IoT WebSocket Console</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #1e1e1e;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: #252526;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 600px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            border-radius: 8px 8px 0 0;
            border-bottom: 2px solid #764ba2;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .status {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse-red 1s infinite;
        }

        .status-indicator.connected {
            background: #44ff44;
            animation: pulse-green 1s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-text {
            font-size: 14px;
        }

        .console {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            margin: 15px;
            font-size: 13px;
            line-height: 1.5;
            border-radius: 4px;
        }

        .console::-webkit-scrollbar {
            width: 8px;
        }

        .console::-webkit-scrollbar-track {
            background: #252526;
        }

        .console::-webkit-scrollbar-thumb {
            background: #3e3e42;
            border-radius: 4px;
        }

        .console::-webkit-scrollbar-thumb:hover {
            background: #4e4e54;
        }

        .log-entry {
            margin: 4px 0;
            padding: 4px 8px;
            border-left: 2px solid #3e3e42;
            border-radius: 2px;
        }

        .log-entry.info {
            color: #569cd6;
            border-left-color: #569cd6;
        }

        .log-entry.sent {
            color: #4ec9b0;
            border-left-color: #4ec9b0;
        }

        .log-entry.received {
            color: #ce9178;
            border-left-color: #ce9178;
        }

        .log-entry.error {
            color: #f48771;
            border-left-color: #f48771;
        }

        .input-section {
            padding: 15px;
            border-top: 1px solid #3e3e42;
            display: flex;
            gap: 10px;
        }

        .input-section input {
            flex: 1;
            padding: 10px 12px;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #e0e0e0;
            border-radius: 4px;
            font-family: inherit;
            font-size: 13px;
        }

        .input-section input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 4px rgba(102, 126, 234, 0.3);
        }

        .input-section button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        .input-section button:hover {
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.4);
        }

        .input-section button:active {
            transform: scale(0.98);
        }

        .input-section button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .footer {
            padding: 10px 15px;
            background: #252526;
            border-top: 1px solid #3e3e42;
            font-size: 12px;
            color: #858585;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Dalhalla IoT Console</h1>
            <div class="status">
                <span class="status-indicator" id="statusIndicator"></span>
                <span class="status-text" id="statusText">Disconnected</span>
            </div>
        </div>

        <div class="console" id="console"></div>

        <div class="input-section">
            <input 
                type="text" 
                id="commandInput" 
                placeholder="Enter command..." 
                disabled
            />
            <button id="sendButton" disabled>Send</button>
        </div>

        <div class="footer">
            ws://127.0.0.1:82
        </div>
    </div>

    <script>
        class WebSocketConsole {
            constructor() {
                this.ws = null;
                this.console = document.getElementById('console');
                this.input = document.getElementById('commandInput');
                this.sendButton = document.getElementById('sendButton');
                this.statusIndicator = document.getElementById('statusIndicator');
                this.statusText = document.getElementById('statusText');

                this.setupEventListeners();
                this.connect();
            }

            setupEventListeners() {
                this.sendButton.addEventListener('click', () => this.sendCommand());
                this.input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendCommand();
                });
            }

            connect() {
                this.log('Connecting to ws://127.0.0.1:82...', 'info');

                this.ws = new WebSocket('ws://127.0.0.1:82');

                this.ws.onopen = () => {
                    this.log('Connected to server', 'info');
                    this.setConnected(true);
                };

                this.ws.onmessage = (event) => {
                    this.log(`Received: ${event.data}`, 'received');
                };

                this.ws.onerror = (error) => {
                    this.log(`Error: ${error.message || 'Unknown error'}`, 'error');
                };

                this.ws.onclose = () => {
                    this.log('Disconnected from server', 'error');
                    this.setConnected(false);
                    setTimeout(() => this.connect(), 3000);
                };
            }

            sendCommand() {
                const command = this.input.value.trim();
                if (!command) return;

                if (!this.ws || this.ws.readyState !== WebSocket.OPEN) {
                    this.log('Not connected to server', 'error');
                    return;
                }

                this.ws.send(command);
                this.log(`Sent: ${command}`, 'sent');
                this.input.value = '';
            }

            setConnected(connected) {
                this.input.disabled = !connected;
                this.sendButton.disabled = !connected;

                if (connected) {
                    this.statusIndicator.classList.add('connected');
                    this.statusText.textContent = 'Connected';
                } else {
                    this.statusIndicator.classList.remove('connected');
                    this.statusText.textContent = 'Disconnected';
                }
            }

            log(message, type = 'info') {
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
                this.console.appendChild(entry);
                this.console.scrollTop = this.console.scrollHeight;
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', () => {
            new WebSocketConsole();
        });
    </script>
</body>
</html>
