<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>DALHAL Terminal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Courier New', monospace;
  font-size: 13px;
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg-page);
  color: var(--fg);
}

/* ── Theme variables ── */
body.light {
  --bg-page:    #f4f4f4;
  --bg-panel:   #ffffff;
  --bg-input:   #f0f0f0;
  --bg-sug:     #ffffff;
  --bg-sug-hover: #e8f0ff;
  --fg:         #1a1a1a;
  --fg-muted:   #444;
  --fg-subtle:  #888;
  --border:     #ccc;
  --border-dim: #ddd;
  --c-green:    #1a7a4a;
  --c-blue:     #1a5fa0;
  --c-red:      #c0392b;
  --c-btn-bg:   #e8e8e8;
  --c-btn-hover:#d0d0d0;
}
body.dark {
  --bg-page:    #1a1a1a;
  --bg-panel:   #111;
  --bg-input:   #161616;
  --bg-sug:     #1e1e1e;
  --bg-sug-hover:#2a2a2a;
  --fg:         #d8d8d8;
  --fg-muted:   #aaa;
  --fg-subtle:  #555;
  --border:     #333;
  --border-dim: #222;
  --c-green:    #4caf89;
  --c-blue:     #7bafd4;
  --c-red:      #e2694b;
  --c-btn-bg:   #2a2a2a;
  --c-btn-hover:#333;
}

/* ── Top toolbar ── */
#toolbar {
  flex: 0 0 auto;
  padding: 8px 12px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
#toolbar-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
#toolbar-top h1 { font-size: 13px; font-weight: bold; color: var(--fg-muted); }
#theme-toggle {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 3px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: var(--c-btn-bg);
  color: var(--fg);
}
#theme-toggle:hover { background: var(--c-btn-hover); }

.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
}
button.cmd-btn {
  font-family: 'Courier New', monospace;
  font-size: 12px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: var(--c-btn-bg);
  color: var(--fg);
  white-space: nowrap;
}
button.cmd-btn:hover { background: var(--c-btn-hover); }
button.cmd-btn.danger { color: var(--c-red); border-color: var(--c-red); }

/* ── Status bar ── */
#status-bar {
  flex: 0 0 auto;
  padding: 3px 12px;
  font-size: 11px;
  background: var(--bg-input);
  border-bottom: 1px solid var(--border);
  color: var(--fg-subtle);
  display: flex;
  gap: 12px;
  align-items: center;
}
#ws-indicator {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #aaa;
  display: inline-block;
  flex-shrink: 0;
}
#ws-indicator.connected { background: #2ecc71; }
#ws-indicator.disconnected { background: #e74c3c; }

/* ── Main area: terminal + log side by side ── */
#main {
  flex: 1 1 0;
  display: flex;
  flex-direction: row;
  min-height: 0;
  gap: 0;
}

/* ── Autocomplete terminal ── */
#terminal-wrap {
  display: flex;
  flex-direction: column;
  width: 420px;
  min-width: 300px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  background: var(--bg-panel);
}
#terminal-label {
  padding: 4px 12px;
  font-size: 11px;
  color: var(--fg-subtle);
  background: var(--bg-input);
  border-bottom: 1px solid var(--border-dim);
}
#autocomplete-output {
  flex: 1 1 0;
  padding: 8px 12px;
  overflow-y: auto;
  line-height: 1.7;
  background: var(--bg-panel);
  color: var(--fg);
  min-height: 0;
}
.line-prompt { color: var(--c-green); font-weight: bold; }
.line-out    { color: var(--fg-muted); }
.line-err    { color: var(--c-red); }
.line-info   { color: var(--c-blue); }
.line-hint   { color: var(--fg-subtle); font-size: 11px; }

#autocomplete-area { position: relative; }
#suggestions {
  position: absolute;
  bottom: 100%;
  left: 0; right: 0;
  background: var(--bg-sug);
  border: 1px solid var(--border);
  border-bottom: none;
  max-height: 200px;
  overflow-y: auto;
  z-index: 20;
  display: none;
}
.sug {
  padding: 5px 12px;
  display: flex;
  gap: 10px;
  align-items: baseline;
  cursor: pointer;
}
.sug:hover, .sug.active { background: var(--bg-sug-hover); }
.sug-name { min-width: 130px; flex-shrink: 0; color: var(--fg); }
.sug-name.has-children::after { content: ' /'; color: var(--fg-subtle); }
.sug.active .sug-name { color: var(--c-green); }
.sug-help { color: var(--fg-subtle); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

#input-row {
  display: flex;
  align-items: center;
  padding: 7px 12px;
  border-top: 1px solid var(--border-dim);
  background: var(--bg-input);
  gap: 5px;
}
#prompt-lbl { color: var(--c-green); white-space: nowrap; }
#cmd-input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--fg);
  font-family: 'Courier New', monospace;
  font-size: 13px;
  flex: 1;
  caret-color: var(--c-green);
}
#key-hint {
  padding: 3px 12px;
  font-size: 11px;
  color: var(--fg-subtle);
  background: var(--bg-input);
  border-top: 1px solid var(--border-dim);
}

/* ── Log pane ── */
#log-wrap {
  flex: 1 1 0;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: var(--bg-panel);
}
#log-label {
  padding: 4px 12px;
  font-size: 11px;
  color: var(--fg-subtle);
  background: var(--bg-input);
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#log-label button {
  font-family: 'Courier New', monospace;
  font-size: 11px;
  padding: 1px 8px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  background: var(--c-btn-bg);
  color: var(--fg);
}
#log {
  flex: 1 1 0;
  overflow-y: auto;
  padding: 8px 12px;
  background: var(--bg-page);
  color: var(--fg);
  line-height: 1.6;
  min-height: 0;
  white-space: pre-wrap;
  font-family: 'Courier New', monospace;
  font-size: 12px;
}
#log details { margin-bottom: 2px; }
#log summary {
  cursor: pointer;
  color: var(--c-blue);
  font-size: 12px;
  padding: 1px 0;
}
#log details pre {
  background: var(--bg-input);
  border: 1px solid var(--border-dim);
  padding: 6px 10px;
  margin: 4px 0 4px 14px;
  font-size: 11px;
  white-space: pre;
  overflow-x: auto;
  color: var(--fg);
}
</style>
</head>
<body class="light">

<!-- ── Toolbar ── -->
<div id="toolbar">
  <div id="toolbar-top">
    <h1>DALHAL WebSocket Terminal</h1>
    <button id="theme-toggle" onclick="toggleTheme()">🌙 dark</button>
  </div>
  <div class="btn-row">
    <button class="cmd-btn" onclick="wsSend('hal/config/reload')">hal/config/reload</button>
    <button class="cmd-btn" onclick="wsSend('hal/config/unload')">hal/config/unload</button>
    <button class="cmd-btn" onclick="wsSend('hal/scripts/reload')">scripts/reload</button>
    <button class="cmd-btn" onclick="wsSend('hal/scripts/stop')">scripts/stop</button>
    <button class="cmd-btn" onclick="wsSend('hal/scripts/start')">scripts/start</button>
  </div>
  <div class="btn-row">
    <button class="cmd-btn" onclick="wsSend('hal/meta/reg/types')">reg/types</button>
    <button class="cmd-btn" onclick="wsSend('hal/meta/reg/functions')">reg/functions</button>
    <button class="cmd-btn" onclick="wsSend('hal/meta/reg/events')">reg/events</button>
    <button class="cmd-btn" onclick="wsSend('hal/meta/reg/cfgschema')">reg/cfgschema</button>
    <button class="cmd-btn" onclick="wsSend('hal/meta/gpio')">meta/gpio</button>
    <button class="cmd-btn" onclick="wsSend('hal/meta/devices')">meta/devices</button>
  </div>
  <div class="btn-row">
    <button class="cmd-btn" onclick="wsSend('printlog')">printlog</button>
    <button class="cmd-btn danger" onclick="wsSend('system/reset')">system/reset</button>
  </div>
</div>

<!-- ── Status bar ── -->
<div id="status-bar">
  <span id="ws-indicator" class="disconnected"></span>
  <span id="ws-status">Disconnected</span>
</div>

<!-- ── Main area ── -->
<div id="main">

  <!-- Autocomplete terminal -->
  <div id="terminal-wrap">
    <div id="terminal-label">autocomplete terminal &nbsp;·&nbsp; delimiter: /</div>
    <div id="autocomplete-output">
      <div class="line-hint">Type commands with / delimiter, e.g. hal/read/string/deviceId. Enter sends via WebSocket.</div>
    </div>
    <div id="autocomplete-area">
      <div id="suggestions" role="listbox"></div>
    </div>
    <div id="input-row">
      <span id="prompt-lbl">&gt;&nbsp;</span>
      <input id="cmd-input" type="text" autocomplete="off" spellcheck="false"
             placeholder="hal/read/…"
             aria-label="Command input" aria-autocomplete="list" aria-haspopup="listbox"/>
    </div>
    <div id="key-hint">Tab — complete &nbsp;·&nbsp; ↑↓ — select / history &nbsp;·&nbsp; Esc — dismiss &nbsp;·&nbsp; Enter — send</div>
  </div>

  <!-- Log pane -->
  <div id="log-wrap">
    <div id="log-label">
      <span>WebSocket log</span>
      <button onclick="document.getElementById('log').innerHTML=''">Clear</button>
    </div>
    <div id="log"></div>
  </div>

</div>

<script>
// ── Command tree ──────────────────────────────────────────────────────────────
var helpTree = {};

// ── Theme ─────────────────────────────────────────────────────────────────────
let isDark = false;
function toggleTheme() {
  isDark = !isDark;
  document.body.className = isDark ? 'dark' : 'light';
  document.getElementById('theme-toggle').textContent = isDark ? '☀️ light' : '🌙 dark';
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
let ws;
const RECONNECT_MS = 2000;
let chunks = [];
const decoder = new TextDecoder('utf-8');

let location_host = location.host;
if (!location_host.endsWith(':82')) location_host += ':82';

function setWsStatus(connected, text) {
  const dot = document.getElementById('ws-indicator');
  dot.className = connected ? 'connected' : 'disconnected';
  document.getElementById('ws-status').textContent = text;
}

function connect() {
  ws = new WebSocket(`ws://${location_host}/ws`);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    setWsStatus(true, `Connected to ws://${location_host}/ws`);
    logText('Connected\n');
    wsSend('help');
  };

  ws.onmessage = (evt) => {
    if (typeof evt.data === 'string') {
      let jsonData;
      try {
        jsonData = JSON.parse(evt.data);
        if (jsonData.type === 'start_chunked') {
          chunks = [];
        } else if (jsonData.type === 'end_chunked') {
          const total = chunks.reduce((s, c) => s + c.length, 0);
          const merged = new Uint8Array(total);
          let offset = 0;
          for (const c of chunks) { merged.set(c, offset); offset += c.length; }
          const text = decoder.decode(merged);
          if (jsonData.dataType === 'json') {
            try { 
              let parsedJson = JSON.parse(text);
              if (jsonData.tag == 'help') {
                helpTree = JSON.parse(text); // create copy
              }
              logCollapsible(parsedJson, jsonData.tag); }
            catch(e) { logText('(chunk parse error)\n' + text); }
          } else {
            logText(text);
          }
        } else {
          logCollapsible(jsonData);
        }
      } catch(e) {
        logText(evt.data);
      }
    } else {
      chunks.push(new Uint8Array(evt.data));
    }
  };

  ws.onclose = () => {
    setWsStatus(false, `Disconnected — reconnecting in ${RECONNECT_MS/1000}s…`);
    logText('Disconnected, reconnecting…\n');
    setTimeout(connect, RECONNECT_MS);
  };

  ws.onerror = () => ws.close();
}

function wsSend(cmd) {
  const trimmed = cmd.trim().replace(/\/$/, '');
  if (!trimmed) return;
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(trimmed);
    termPrintLine('> ' + trimmed, 'line-prompt');
  } else {
    termPrintLine('Not connected', 'line-err');
  }
}

// ── Log helpers ───────────────────────────────────────────────────────────────
const log = document.getElementById('log');

function logText(text) {
  const div = document.createElement('div');
  div.style.whiteSpace = 'pre-wrap';
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

function logCollapsible(jsonData, titleStr) {
  const details = document.createElement('details');
  const summary = document.createElement('summary');
  const oneLine = JSON.stringify(jsonData);

  summary.innerHTML =
    `<strong style="color: #4CAF50;">${titleStr ?? ''}</strong> ` +
    (oneLine.length > 100 ? oneLine.slice(0, 97) + '…' : oneLine);
    
  details.appendChild(summary);
  const pre = document.createElement('pre');
  pre.textContent = JSON.stringify(jsonData, null, 2);
  details.appendChild(pre);
  log.appendChild(details);
  log.scrollTop = log.scrollHeight;
}

// ── Autocomplete terminal ─────────────────────────────────────────────────────
const input   = document.getElementById('cmd-input');
const sugBox  = document.getElementById('suggestions');
const termOut = document.getElementById('autocomplete-output');
let activeIdx = -1, currentSugs = [], history = [], histIdx = -1;

function termPrintLine(text, cls) {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  termOut.appendChild(div);
  termOut.scrollTop = termOut.scrollHeight;
}

function splitCmd(val) {
  const si = val.lastIndexOf('/');
  if (si === -1) return { prefix: '', last: val, parts: val ? [] : [] };
  return {
    prefix: val.slice(0, si + 1),
    last:   val.slice(si + 1),
    parts:  val.slice(0, si).split('/').filter(Boolean)
  };
}

function getNode(parts) {
  let node = helpTree.root;
  for (const p of parts) {
    if (!node.children) return null;
    const found = node.children.find(c => c.name === p);
    if (!found) return null;
    node = found;
  }
  return node;
}

function getSuggestions(val) {
  const { parts, last } = splitCmd(val);
  // If no slash yet, search root children
  const parentParts = val.includes('/') ? parts : [];
  const parentNode = getNode(parentParts);
  if (!parentNode || !parentNode.children) return [];
  const token = val.includes('/') ? last : val;
  return parentNode.children
    .filter(c => c.name.toLowerCase().startsWith(token.toLowerCase()))
    .map(c => ({ name: c.name, help: c.help, hasChildren: !!(c.children && c.children.length) }));
}

function getCommonPrefix(strs) {
  if (!strs.length) return '';
  let p = strs[0];
  for (let i = 1; i < strs.length; i++) while (!strs[i].toLowerCase().startsWith(p.toLowerCase())) p = p.slice(0,-1);
  return p;
}

function renderSuggestions(sugs) {
  currentSugs = sugs; activeIdx = -1;
  if (!sugs.length) { sugBox.style.display = 'none'; return; }
  sugBox.style.display = 'block';
  sugBox.innerHTML = sugs.map((s,i) => `<div class="sug" data-idx="${i}" role="option" aria-selected="false">
    <span class="sug-name${s.hasChildren?' has-children':''}">${s.name}</span>
    <span class="sug-help">${s.help}</span>
  </div>`).join('');
  sugBox.querySelectorAll('.sug').forEach(el =>
    el.addEventListener('mousedown', e => { e.preventDefault(); pickSuggestion(+el.dataset.idx); })
  );
}

function hideSuggestions() { sugBox.style.display='none'; currentSugs=[]; activeIdx=-1; }

function setActive(idx) {
  const items = sugBox.querySelectorAll('.sug');
  items.forEach((el,i) => { el.classList.toggle('active', i===idx); el.setAttribute('aria-selected', i===idx); });
  if (idx>=0 && items[idx]) items[idx].scrollIntoView({block:'nearest'});
  activeIdx = idx;
}

function pickSuggestion(idx) {
  if (idx < 0 || idx >= currentSugs.length) return;
  const sug = currentSugs[idx];
  const { prefix } = splitCmd(input.value);
  input.value = (input.value.includes('/') ? prefix : '') + sug.name + (sug.hasChildren ? '/' : '');
  hideSuggestions();
  input.focus();
  updateSuggestions();
}

function updateSuggestions() {
  if (!input.value.trim()) { hideSuggestions(); return; }
  renderSuggestions(getSuggestions(input.value));
}

input.addEventListener('input', updateSuggestions);

input.addEventListener('keydown', e => {
  const visible = sugBox.style.display !== 'none';

  if (e.key === 'Tab') {
    e.preventDefault();
    const sugs = getSuggestions(input.value);
    if (!sugs.length) return;
    if (sugs.length === 1) { pickSuggestion(0); return; }
    const { prefix, last } = splitCmd(input.value);
    const common = getCommonPrefix(sugs.map(s=>s.name));
    const token = input.value.includes('/') ? last : input.value;
    if (common.length > token.length) {
      input.value = (input.value.includes('/') ? prefix : '') + common;
      updateSuggestions();
    } else {
      renderSuggestions(sugs);
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!visible) { updateSuggestions(); return; }
    setActive(Math.min(activeIdx+1, currentSugs.length-1));
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (visible && activeIdx > 0) { setActive(activeIdx-1); return; }
    if (!visible && histIdx < history.length-1) { histIdx++; input.value=history[histIdx]; hideSuggestions(); }
    return;
  }

  if (e.key === 'Escape') { hideSuggestions(); return; }

  if (e.key === 'Enter') {
    if (visible && activeIdx >= 0) { pickSuggestion(activeIdx); return; }
    hideSuggestions();
    const cmd = input.value.trim();
    if (cmd) {
      history.unshift(cmd); histIdx = -1;
      wsSend(cmd);
    }
    input.value = '';
    return;
  }
});

input.focus();
connect();
</script>
</body>
</html>
