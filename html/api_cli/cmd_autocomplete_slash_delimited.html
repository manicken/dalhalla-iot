
<style>
*{box-sizing:border-box;margin:0;padding:0}
#wrap{font-family:var(--font-mono);font-size:13px;border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);overflow:hidden;display:flex;flex-direction:column;min-height:360px}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
#topbar span{font-size:12px;color:var(--color-text-secondary)}
#theme-toggle{font-size:12px;font-family:var(--font-mono);padding:3px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary)}
#output{flex:1;padding:10px 14px;overflow-y:auto;max-height:220px;line-height:1.7;background:var(--bg);color:var(--fg)}
.line-prompt{color:var(--c-green);font-weight:500}
.line-out{color:var(--fg-muted)}
.line-err{color:var(--c-red)}
.line-info{color:var(--c-blue)}
.line-hint{color:var(--fg-subtle);font-size:11px}
#autocomplete-area{position:relative;background:var(--bg)}
#suggestions{position:absolute;bottom:100%;left:0;right:0;background:var(--sug-bg);border:0.5px solid var(--color-border-secondary);border-bottom:none;max-height:180px;overflow-y:auto;z-index:10;display:none}
.sug{padding:5px 14px;display:flex;gap:10px;align-items:baseline;cursor:pointer}
.sug:hover,.sug.active{background:var(--sug-hover)}
.sug-name{min-width:130px;flex-shrink:0;color:var(--fg)}
.sug-name.has-children::after{content:' /';color:var(--fg-subtle)}
.sug.active .sug-name{color:var(--c-green)}
.sug-help{color:var(--fg-subtle);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#input-row{display:flex;align-items:center;padding:7px 12px;border-top:0.5px solid var(--color-border-tertiary);background:var(--input-bg);gap:5px}
#prompt-lbl{color:var(--c-green);white-space:nowrap;flex-shrink:0}
#cmd-input{background:transparent;border:none;outline:none;color:var(--fg);font-family:var(--font-mono);font-size:13px;flex:1;caret-color:var(--c-green)}
#key-hint{padding:3px 12px;font-size:11px;color:var(--fg-subtle);background:var(--input-bg);border-top:0.5px solid var(--color-border-tertiary)}

.light{--bg:#fff;--fg:#1a1a1a;--fg-muted:#444;--fg-subtle:#999;--sug-bg:#fafafa;--sug-hover:#f0f0f0;--input-bg:#f5f5f5;--c-green:#1a7a4a;--c-blue:#1a5fa0;--c-red:#c0392b}
.dark{--bg:#0d0d0d;--fg:#d8d8d8;--fg-muted:#aaa;--fg-subtle:#555;--sug-bg:#1a1a1a;--sug-hover:#252525;--input-bg:#111;--c-green:#4caf89;--c-blue:#7bafd4;--c-red:#e2694b}
</style>

<h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Command terminal with slash-delimited autocomplete</h2>

<div id="wrap" class="light">
  <div id="topbar">
    <span>DALHAL terminal &nbsp;·&nbsp; delimiter: <code>/</code></span>
    <button id="theme-toggle" onclick="toggleTheme()">🌙 dark</button>
  </div>
  <div id="output">
    <div class="line-hint">Type commands using / as delimiter, e.g. hal/read/string/deviceId</div>
  </div>
  <div id="autocomplete-area">
    <div id="suggestions" role="listbox"></div>
  </div>
  <div id="input-row">
    <span id="prompt-lbl">&gt;&nbsp;</span>
    <input id="cmd-input" type="text" autocomplete="off" spellcheck="false" placeholder="hal/read/…" aria-label="Command input" aria-autocomplete="list" aria-haspopup="listbox"/>
  </div>
  <div id="key-hint">Tab — complete &nbsp;·&nbsp; ↑↓ — select &nbsp;·&nbsp; Esc — dismiss &nbsp;·&nbsp; Enter — run</div>
</div>

<script>
const tree = {"root":{"name":"","help":"root item","children":[{"name":"hal","help":"HAL subsystem","children":[{"name":"exec","help":"run device exec cmd","children":[]},{"name":"write","help":"run device write cmds","children":[{"name":"string","help":"hal write string","children":[]},{"name":"uint32","help":"hal write uint32","children":[]},{"name":"int32","help":"hal write int32","children":[]},{"name":"bool","help":"hal write bool","children":[]},{"name":"float","help":"hal write float","children":[]}]},{"name":"read","help":"run device read cmds","children":[{"name":"string","help":"hal read string","children":[]},{"name":"uint32","help":"hal read uint32","children":[]},{"name":"int32","help":"hal read int32","children":[]},{"name":"bool","help":"hal read bool","children":[]},{"name":"float","help":"hal read float","children":[]}]},{"name":"config","help":"hal config cmds","children":[{"name":"reload","help":"hal config reload","children":[]},{"name":"unload","help":"hal config/script unload","children":[]}]},{"name":"scripts","help":"script specific commands","children":[{"name":"reload","help":"scripts reload","children":[]},{"name":"stop","help":"scripts stop/pause execution","children":[]},{"name":"start","help":"scripts start/resume execution","children":[]}]},{"name":"meta","help":"print metadata","children":[{"name":"gpio","help":"get a list of available GPIO on this target","children":[]},{"name":"devices","help":"print all current loaded devices","children":[]},{"name":"reg","help":"print registry metadata","children":[{"name":"types","help":"print device type registry basedata","children":[]},{"name":"functions","help":"print device type registry with functions","children":[]},{"name":"events","help":"print device type registry with events","children":[]},{"name":"cfgschema","help":"print config json schema","children":[]}]}]}]},{"name":"system","help":"System commands","children":[{"name":"info","help":"System info","children":[]},{"name":"heap","help":"Print heap info","children":[]},{"name":"reset","help":"Reset the system","children":[]},{"name":"restart","help":"Restart the system","children":[]},{"name":"HeartbeatLed","help":"HeartBeatLed set timings","children":[]},{"name":"ver","help":"Print current build version","children":[]}]},{"name":"wifi","help":"WiFi management","children":[{"name":"scan","help":"Scan WiFi for AP:s","children":[]},{"name":"set_b64","help":"Set WiFi settings from b64 string","children":[]},{"name":"set_json","help":"Set WiFi settings from json string","children":[]}]},{"name":"printLog","help":"print log","children":[]},{"name":"schedule","help":"Schedule commands","children":[]},{"name":"help","help":"Show help","children":[]}]}};

const input = document.getElementById('cmd-input');
const sugBox = document.getElementById('suggestions');
const output = document.getElementById('output');
const wrap = document.getElementById('wrap');
let activeIdx = -1;
let currentSugs = [];
let history = [];
let histIdx = -1;
let isDark = false;

function toggleTheme() {
  isDark = !isDark;
  wrap.className = isDark ? 'dark' : 'light';
  document.getElementById('theme-toggle').textContent = isDark ? '☀️ light' : '🌙 dark';
}

function splitCmd(val) {
  const slashIdx = val.lastIndexOf('/');
  if (slashIdx === -1) return { prefix: '', last: val, parts: val ? [val] : [] };
  const prefix = val.slice(0, slashIdx + 1);
  const last = val.slice(slashIdx + 1);
  const parts = val.slice(0, slashIdx).split('/').filter(Boolean);
  return { prefix, last, parts };
}

function getNode(parts) {
  let node = tree.root;
  for (const p of parts) {
    if (!node.children) return null;
    const found = node.children.find(c => c.name === p);
    if (!found) return null;
    node = found;
  }
  return node;
}

function getNodeExact(val) {
  const parts = val.split('/').filter(Boolean);
  return getNode(parts);
}

function getSuggestions(val) {
  const { parts, last } = splitCmd(val);
  const parentNode = getNode(parts);
  if (!parentNode || !parentNode.children) return [];
  return parentNode.children
    .filter(c => c.name.toLowerCase().startsWith(last.toLowerCase()))
    .map(c => ({ name: c.name, help: c.help, hasChildren: c.children && c.children.length > 0 }));
}

function getCommonPrefix(strs) {
  if (!strs.length) return '';
  let p = strs[0];
  for (let i = 1; i < strs.length; i++) while (!strs[i].toLowerCase().startsWith(p.toLowerCase())) p = p.slice(0,-1);
  return p;
}

function renderSuggestions(sugs) {
  currentSugs = sugs;
  activeIdx = -1;
  if (!sugs.length) { sugBox.style.display = 'none'; return; }
  sugBox.style.display = 'block';
  sugBox.innerHTML = sugs.map((s, i) => `<div class="sug" data-idx="${i}" role="option" aria-selected="false">
    <span class="sug-name${s.hasChildren ? ' has-children' : ''}">${s.name}</span>
    <span class="sug-help">${s.help}</span>
  </div>`).join('');
  sugBox.querySelectorAll('.sug').forEach(el => {
    el.addEventListener('mousedown', e => { e.preventDefault(); pickSuggestion(parseInt(el.dataset.idx)); });
  });
}

function hideSuggestions() {
  sugBox.style.display = 'none';
  currentSugs = [];
  activeIdx = -1;
}

function setActive(idx) {
  const items = sugBox.querySelectorAll('.sug');
  items.forEach((el, i) => { el.classList.toggle('active', i === idx); el.setAttribute('aria-selected', i === idx); });
  if (idx >= 0 && items[idx]) items[idx].scrollIntoView({ block: 'nearest' });
  activeIdx = idx;
}

function pickSuggestion(idx) {
  if (idx < 0 || idx >= currentSugs.length) return;
  const sug = currentSugs[idx];
  const { prefix } = splitCmd(input.value);
  input.value = prefix + sug.name + (sug.hasChildren ? '/' : '');
  hideSuggestions();
  input.focus();
  updateSuggestions();
}

function updateSuggestions() {
  if (!input.value.trim()) { hideSuggestions(); return; }
  renderSuggestions(getSuggestions(input.value));
}

function printLine(text, cls) {
  const div = document.createElement('div');
  div.className = cls;
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

function runCommand(raw) {
  const cmd = raw.trim().replace(/\/$/, '');
  if (!cmd) return;
  history.unshift(raw.trim());
  histIdx = -1;

  printLine('> ' + raw.trim(), 'line-prompt');

  const parts = cmd.split('/').filter(Boolean);
  const node = getNode(parts);

  if (node) {
    if (node.children && node.children.length > 0) {
      printLine('Subcommands: ' + node.children.map(c => c.name).join('  ·  '), 'line-info');
      printLine(node.help, 'line-out');
    } else {
      printLine('[exec] ' + cmd, 'line-info');
      printLine('→ ' + node.help, 'line-out');
    }
  } else {
    printLine('Unknown command: ' + cmd, 'line-err');
    const sugs = getSuggestions(raw.trim());
    if (sugs.length) printLine('Did you mean: ' + sugs.map(s=>s.name).join(', ') + '?', 'line-hint');
    else {
      const top = tree.root.children.filter(c => c.name.startsWith(parts[0] || '')).map(c=>c.name);
      if (top.length) printLine('Top-level: ' + top.join(', '), 'line-hint');
    }
  }
}

input.addEventListener('input', updateSuggestions);

input.addEventListener('keydown', e => {
  const visible = sugBox.style.display !== 'none';

  if (e.key === 'Tab') {
    e.preventDefault();
    const sugs = getSuggestions(input.value);
    if (!sugs.length) return;
    if (sugs.length === 1) { pickSuggestion(0); return; }
    const names = sugs.map(s => s.name);
    const { prefix, last } = splitCmd(input.value);
    const common = getCommonPrefix(names);
    if (common.length > last.length) {
      input.value = prefix + common;
      updateSuggestions();
    } else {
      renderSuggestions(sugs);
    }
    return;
  }

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (!visible) { updateSuggestions(); return; }
    setActive(Math.min(activeIdx + 1, currentSugs.length - 1));
    return;
  }

  if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (visible && activeIdx > 0) { setActive(activeIdx - 1); return; }
    if (!visible && histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; hideSuggestions(); }
    return;
  }

  if (e.key === 'Escape') { hideSuggestions(); return; }

  if (e.key === 'Enter') {
    if (visible && activeIdx >= 0) { pickSuggestion(activeIdx); return; }
    hideSuggestions();
    runCommand(input.value);
    input.value = '';
    return;
  }
});

input.focus();
</script>
