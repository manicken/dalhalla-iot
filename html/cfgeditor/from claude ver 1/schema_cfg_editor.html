
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary)}
.editor-wrap{display:flex;height:600px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;background:var(--color-background-primary)}
.sidebar{width:220px;min-width:220px;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;overflow:hidden}
.sidebar-header{padding:10px 12px;font-size:12px;font-weight:500;color:var(--color-text-secondary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px}
.device-list{flex:1;overflow-y:auto;padding:4px}
.device-item{padding:6px 10px;border-radius:var(--border-radius-md);cursor:pointer;display:flex;align-items:center;gap:8px;margin:1px 0}
.device-item:hover{background:var(--color-background-primary)}
.device-item.active{background:var(--color-background-info);color:var(--color-text-info)}
.device-item.disabled-item{opacity:0.45}
.device-type-badge{font-size:10px;padding:1px 5px;border-radius:4px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);flex-shrink:0;font-family:var(--font-mono)}
.device-item.active .device-type-badge{background:rgba(255,255,255,0.25);color:inherit;border-color:transparent}
.device-uid{font-size:13px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.main-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.toolbar{padding:8px 12px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toolbar select,.toolbar input[type=text]{font-size:13px;padding:4px 8px;height:30px}
.btn{padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer;font-size:13px;height:30px;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--color-background-secondary)}
.btn.btn-primary{background:var(--color-background-info);color:var(--color-text-info);border-color:transparent}
.btn.btn-danger{background:var(--color-background-danger);color:var(--color-text-danger);border-color:transparent}
.btn.btn-success{background:var(--color-background-success);color:var(--color-text-success);border-color:transparent}
.form-panel{flex:1;overflow-y:auto;padding:16px}
.field-row{margin-bottom:12px;display:flex;flex-direction:column;gap:4px}
.field-row label{font-size:12px;color:var(--color-text-secondary);font-weight:500}
.field-row input,.field-row select,.field-row textarea{font-size:13px;width:100%;padding:5px 8px}
.field-row textarea{min-height:60px;resize:vertical}
.field-row .field-note{font-size:11px;color:var(--color-text-tertiary)}
.required-star{color:var(--color-text-danger)}
.section-title{font-size:12px;font-weight:500;color:var(--color-text-secondary);padding:8px 0 4px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:8px}
.sub-array{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px;background:var(--color-background-secondary);margin-top:4px}
.sub-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px;margin-bottom:6px}
.sub-item-header{display:flex;align-items:center;gap:6px;margin-bottom:6px;cursor:pointer}
.sub-item-header .collapse-arrow{font-size:10px;transition:transform 0.15s}
.sub-item-header .collapse-arrow.open{transform:rotate(90deg)}
.sub-item-uid{font-size:12px;font-weight:500}
.sub-item-actions{margin-left:auto;display:flex;gap:4px}
.mini-btn{padding:2px 7px;font-size:11px;height:20px}
.no-select{color:var(--color-text-tertiary);font-size:13px;padding:40px;text-align:center}
.validation-error{font-size:11px;color:var(--color-text-danger);margin-top:2px}
.json-panel{background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);height:0;overflow:hidden;transition:height 0.2s}
.json-panel.open{height:180px}
.json-panel textarea{width:100%;height:100%;font-family:var(--font-mono);font-size:11px;border:none;background:transparent;color:var(--color-text-primary);padding:10px;resize:none;outline:none}
.mode-tabs{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);padding:0 12px}
.mode-tab{padding:6px 14px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-0.5px}
.mode-tab.active{color:var(--color-text-info);border-bottom-color:currentColor}
.add-device-bar{padding:8px 12px;border-top:0.5px solid var(--color-border-tertiary);display:flex;gap:6px}
.add-device-bar select{flex:1;font-size:12px}
.status-bar{padding:4px 12px;font-size:11px;color:var(--color-text-secondary);border-top:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--color-background-success)}
.field-inline{display:flex;gap:8px}
.field-inline > *{flex:1}
.disabled-toggle{display:flex;align-items:center;gap:8px;margin-bottom:14px;padding:8px 10px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary)}
.disabled-label{font-size:12px;color:var(--color-text-secondary)}
.cfg-array-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.items-count{font-size:11px;color:var(--color-text-tertiary)}
</style>

<div style="padding:0 0 1rem">

<div class="editor-wrap" id="editor">
  <div class="sidebar">
    <div class="sidebar-header">
      <span>Devices</span>
      <span id="device-count" style="font-size:11px;background:var(--color-background-primary);padding:1px 6px;border-radius:10px;border:0.5px solid var(--color-border-tertiary)">0</span>
    </div>
    <div class="device-list" id="device-list"></div>
    <div class="add-device-bar">
      <select id="add-type-select"></select>
      <button class="btn btn-primary mini-btn" id="add-btn" style="height:28px;font-size:12px">+ Add</button>
    </div>
  </div>

  <div class="main-panel">
    <div class="toolbar">
      <button class="btn" id="json-toggle-btn">{ } JSON</button>
      <button class="btn btn-success" id="save-btn">Save changes</button>
      <button class="btn btn-danger" id="delete-btn" style="margin-left:auto">Delete</button>
    </div>
    <div class="mode-tabs" id="mode-tabs"></div>
    <div class="form-panel" id="form-panel">

    </div>
    <div class="json-panel" id="json-panel">
      <textarea id="json-textarea" spellcheck="false"></textarea>
    </div>
    <div class="status-bar">
      <span class="status-dot" id="status-dot"></span>
      <span id="status-msg">Ready</span>
    </div>
  </div>
</div>

</div>

<script>
var schema = {
  "ROOT": {
    "VAR": {"type":"object","name":"ScriptVariable","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true,"minLength":1,"maxLength":8,"default":""},{"name":"note","type":"String","required":false,"minLength":1,"maxLength":0,"default":""},{"name":"type","type":"String","required":true,"minLength":1,"maxLength":0,"default":""},{"name":"value","type":"Number","required":false}]},
    "CONSTVAR": {"type":"object","name":"ScriptVariableReadOnly","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true,"minLength":1,"maxLength":8,"default":""},{"name":"note","type":"String","required":false,"minLength":1,"maxLength":0,"default":""},{"name":"type","type":"String","required":true,"minLength":1,"maxLength":0,"default":""},{"name":"value","type":"Number","required":false}]},
    "WRITEVAR": {"type":"object","name":"ScriptVariableWriteOnlyTest","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true,"minLength":1,"maxLength":8,"default":""},{"name":"note","type":"String","required":false,"minLength":1,"maxLength":0,"default":""},{"name":"type","type":"String","required":true,"minLength":1,"maxLength":0,"default":""}]},
    "DIN": {"type":"object","name":"DigitalInput","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true}]},
    "DOUT": {"type":"object","name":"DigitalOutput","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true}]},
    "DPOUT": {"type":"object","name":"SinglePulseOutput","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true},{"name":"plength","type":"UInt","required":false,"min":1,"max":0,"default":500},{"name":"activeLevel","type":"String","required":false,"allowedValues":["low","high"],"default":"high"}]},
    "ADC": {"type":"object","name":"AnalogInput","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true}]},
    "DHT": {"type":"object","name":"DHT","unknownPolicy":"Warn","emptyPolicy":"Error","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"model","type":"String","required":true,"allowedValues":["DHT11","DHT22","AM2302","RTH03"],"default":"DHT11"},{"name":"refreshtime","type":"OneOfGroup","required":true,"fields":[{"name":"refreshtimems","type":"Float","required":false,"default":0},{"name":"refreshtimesec","type":"Float","required":false,"default":1},{"name":"refreshtimemin","type":"Float","required":false,"default":1}]},{"name":"pin","type":"HardwarePin","required":true}]},
    "WS2812": {"type":"object","name":"WS2812","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true},{"name":"ledcount","type":"UInt","required":true,"min":1,"default":1},{"name":"format","type":"String","required":true,"allowedValues":["RGB","RBG","GRB","GBR","BRG","BGR","RGBW","GRBW","BGRW"],"default":"RGB"},{"name":"ifspeed","type":"String","required":false,"allowedValues":["KHZ800","KHZ400"],"default":"KHZ800"},{"name":"brightness","type":"UInt","required":false,"min":1,"max":127,"default":127},{"name":"mode","type":"UInt","required":false,"min":0,"max":80,"default":0},{"name":"fxspeed","type":"UInt","required":false,"min":0,"max":65535,"default":3000}]},
    "BUTTON": {"type":"object","name":"ButtonInput","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true},{"name":"debounceMs","type":"UInt","required":false,"min":1,"default":30},{"name":"activeLevel","type":"String","required":false,"allowedValues":["low","high"],"default":"high"},{"name":"on_press","type":"String","required":false,"default":""}]},
    "PWM_SERVO": {"type":"object","name":"PWM_Servo","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true},{"name":"ch","type":"UInt","required":true,"min":0,"max":7,"default":0},{"name":"minPulseLength","type":"UInt","required":false,"min":100,"max":20000,"default":1000},{"name":"maxPulseLength","type":"UInt","required":false,"min":100,"max":20000,"default":2000},{"name":"startPulseLength","type":"UInt","required":false,"min":100,"max":20000,"default":1500},{"name":"autoOffAfterMs","type":"UInt","required":false,"min":0,"default":0},{"name":"minVal","type":"Float","required":false,"default":0},{"name":"maxVal","type":"Float","required":false,"default":100}]},
    "1WTD": {"type":"object","name":"OneWireTempDevice","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"refreshtime","type":"OneOfGroup","required":true,"fields":[{"name":"refreshtimems","type":"Float","required":false,"default":0},{"name":"refreshtimesec","type":"Float","required":false,"default":1},{"name":"refreshtimemin","type":"Float","required":false,"default":1}]},{"name":"pin","type":"HardwarePin","required":true},{"name":"romid","type":"HexBytes","required":true}]},
    "ACTUATOR": {"type":"object","name":"Actuator","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pinA","type":"HardwarePin","required":false},{"name":"pinB","type":"HardwarePin","required":false},{"name":"timeoutMs","type":"UInt","required":false,"min":1,"default":10000}]},
    "I2C": {"type":"object","name":"I2C_Master","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"sckpin","type":"HardwarePin","required":true},{"name":"sdapin","type":"HardwarePin","required":true}]},
    "TX433": {"type":"object","name":"TX433","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"pin","type":"HardwarePin","required":true}]},
    "REGO600": {"type":"object","name":"REGO600","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"rxpin","type":"HardwarePin","required":true},{"name":"txpin","type":"HardwarePin","required":true},{"name":"requestDelayMs","type":"UInt","required":false,"min":0,"default":10},{"name":"refreshtime","type":"OneOfGroup","required":true,"fields":[{"name":"refreshtimems","type":"Float","required":false,"default":0},{"name":"refreshtimesec","type":"Float","required":false,"default":1},{"name":"refreshtimemin","type":"Float","required":false,"default":1}]}]},
    "HOMEASSISTANT": {"type":"object","name":"HomeAssistant","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"deviceId","type":"String","required":true,"default":""},{"name":"host","type":"String","required":true,"default":""},{"name":"port","type":"UInt","required":true,"min":1,"max":65535,"default":1883},{"name":"user","type":"String","required":false,"default":""},{"name":"pass","type":"String","required":false,"default":""}]},
    "THINGSPEAK": {"type":"object","name":"ThingSpeak","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"refreshtime","type":"OneOfGroup","required":false,"fields":[{"name":"refreshtimems","type":"Float","required":false,"default":0},{"name":"refreshtimesec","type":"Float","required":false,"default":1},{"name":"refreshtimemin","type":"Float","required":false,"default":1}]}]},
    "ARRAY": {"type":"object","name":"ScriptArray","unknownPolicy":"Warn","emptyPolicy":"Warn","fields":[{"name":"disabled","type":"Bool","required":false},{"name":"uid","type":"UID","required":true},{"name":"note","type":"String","required":false},{"name":"type","type":"String","required":true},{"name":"readonly","type":"Bool","required":false}]}
  }
};

var examplecfg = [
  {"uid":"true","value":1,"type":"CONSTVAR"},
  {"uid":"false","value":0,"type":"CONSTVAR"},
  {"uid":"var1","type":"VAR"},{"uid":"var2","type":"VAR"},
  {"uid":"birel","type":"ACTUATOR","pinA":18,"pinB":19},
  {"disabled":true,"uid":"BIRELSET","type":"DPOUT","pin":18,"plength":5000},
  {"uid":"hum","type":"DHT","model":"DHT11","refreshtimesec":2,"pin":23},
  {"uid":"servo","type":"PWM_SERVO","pin":32,"ch":0,"autoOffAfterMs":3000,"minPulseLength":1000,"maxPulseLength":2000,"startPulseLength":1450,"minVal":-45,"maxVal":45},
  {"uid":"i2c","type":"I2C","sckpin":22,"sdapin":21},
  {"uid":"led","type":"DOUT","pin":25},
  {"uid":"neo","type":"WS2812","pin":26,"ledcount":1,"format":"RGB","ifspeed":"KHZ400","brightness":64,"mode":12,"fxspeed":32000},
  {"disabled":true,"uid":"hp","type":"REGO600","rxpin":34,"txpin":33,"refreshtimesec":5},
  {"uid":"tx433","type":"TX433","pin":15},
  {"uid":"btn1","type":"BUTTON","pin":4,"debounceMs":30,"activeLevel":"low"}
];

var cfg = JSON.parse(JSON.stringify(examplecfg));
var selectedIdx = -1;
var jsonOpen = false;
var dirty = false;

var rootTypeKeys = Object.keys(schema.ROOT);

var typeDescriptions = {
  VAR:"Script Variable", CONSTVAR:"Const Variable", WRITEVAR:"Write-only Var",
  DIN:"Digital Input", DOUT:"Digital Output", DPOUT:"Pulse Output",
  ADC:"Analog Input", DHT:"DHT Sensor", WS2812:"WS2812 LED Strip",
  BUTTON:"Button Input", PWM_SERVO:"PWM Servo", "1WTD":"1-Wire Temp",
  ACTUATOR:"Actuator/H-Bridge", I2C:"I2C Master", TX433:"433MHz TX",
  REGO600:"REGO600 Heat Pump", HOMEASSISTANT:"Home Assistant MQTT",
  THINGSPEAK:"ThingSpeak IoT", ARRAY:"Script Array"
};

var refreshGroupFields = [
  {key:"refreshtimesec",label:"Refresh (sec)"},
  {key:"refreshtimemin",label:"Refresh (min)"},
  {key:"refreshtimems",label:"Refresh (ms)"}
];

function getDeviceType(item) {
  return (item.type||"").toUpperCase();
}

function schemaForType(typeKey) {
  return schema.ROOT[typeKey] || null;
}

function setStatus(msg, ok) {
  var dot = document.getElementById('status-dot');
  var txt = document.getElementById('status-msg');
  txt.textContent = msg;
  dot.style.background = ok === false ? 'var(--color-background-danger)' : 'var(--color-background-success)';
}

function renderSidebar() {
  var list = document.getElementById('device-list');
  list.innerHTML = '';
  cfg.forEach(function(item, i) {
    if (typeof item !== 'object') return;
    var div = document.createElement('div');
    div.className = 'device-item' + (i===selectedIdx?' active':'') + (item.disabled?' disabled-item':'');
    div.innerHTML = '<span class="device-uid">' + escH(item.uid||'(no uid)') + '</span><span class="device-type-badge">' + escH(item.type||'?') + '</span>';
    div.onclick = function(){ selectDevice(i); };
    list.appendChild(div);
  });
  document.getElementById('device-count').textContent = cfg.length;
}

function selectDevice(idx) {
  selectedIdx = idx;
  renderSidebar();
  renderForm();
  updateJsonPanel();
}

function renderForm() {
  var panel = document.getElementById('form-panel');
  var modeTabs = document.getElementById('mode-tabs');
  modeTabs.innerHTML = '';
  if (selectedIdx < 0 || selectedIdx >= cfg.length) {
    panel.innerHTML = '<div class="no-select">Select a device from the sidebar or add a new one</div>';
    return;
  }
  var item = cfg[selectedIdx];
  var typeKey = getDeviceType(item);
  var schemaDef = schemaForType(typeKey);

  panel.innerHTML = '';

  var disabledRow = document.createElement('div');
  disabledRow.className = 'disabled-toggle';
  var disabledChk = document.createElement('input');
  disabledChk.type = 'checkbox';
  disabledChk.id = 'field-disabled';
  disabledChk.checked = !!item.disabled;
  disabledChk.onchange = function() { item.disabled = this.checked; renderSidebar(); markDirty(); };
  var disabledLbl = document.createElement('label');
  disabledLbl.htmlFor = 'field-disabled';
  disabledLbl.className = 'disabled-label';
  disabledLbl.textContent = 'Disabled';
  disabledRow.appendChild(disabledChk);
  disabledRow.appendChild(disabledLbl);
  var typeSpan = document.createElement('span');
  typeSpan.style.cssText = 'margin-left:auto;font-size:11px;color:var(--color-text-secondary);font-family:var(--font-mono)';
  typeSpan.textContent = typeKey + (schemaDef ? ' — ' + schemaDef.name : '');
  disabledRow.appendChild(typeSpan);
  panel.appendChild(disabledRow);

  addField(panel, item, {name:'uid', type:'UID', required:true, maxLength:8}, typeKey);
  addField(panel, item, {name:'note', type:'String', required:false}, typeKey);

  if (!schemaDef) {
    var warn = document.createElement('div');
    warn.style.cssText = 'color:var(--color-text-warning);font-size:12px;padding:8px;background:var(--color-background-warning);border-radius:var(--border-radius-md);margin-bottom:8px';
    warn.textContent = 'Unknown device type: ' + typeKey + '. Showing raw JSON only.';
    panel.appendChild(warn);
    renderRawFields(panel, item, ['disabled','uid','note','type']);
    return;
  }

  var fieldsToSkip = ['disabled','uid','note','type'];
  var fields = (schemaDef.fields||[]).filter(function(f){ return fieldsToSkip.indexOf(f.name)<0; });

  var hasRefresh = fields.some(function(f){ return f.name==='refreshtime'; });
  
  fields.forEach(function(f) {
    if (f.name === 'refreshtime') {
      addRefreshField(panel, item);
    } else {
      addField(panel, item, f, typeKey);
    }
  });

  var extraKeys = Object.keys(item).filter(function(k){
    if (['disabled','uid','note','type'].indexOf(k)>=0) return false;
    if (hasRefresh && ['refreshtimesec','refreshtimemin','refreshtimems'].indexOf(k)>=0) return false;
    if (fields.some(function(f){ return f.name===k; })) return false;
    return true;
  });
  if (extraKeys.length) {
    var sec = document.createElement('div');
    sec.className = 'section-title';
    sec.textContent = 'Additional / unknown fields';
    panel.appendChild(sec);
    extraKeys.forEach(function(k) {
      addGenericField(panel, item, k);
    });
  }
}

function addRefreshField(panel, item) {
  var row = document.createElement('div');
  row.className = 'field-row';
  var lbl = document.createElement('label');
  lbl.textContent = 'Refresh time';
  row.appendChild(lbl);

  var wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;gap:6px;align-items:center';

  var sel = document.createElement('select');
  sel.style.cssText = 'width:120px;font-size:13px;padding:4px 6px';
  refreshGroupFields.forEach(function(rf) {
    var opt = document.createElement('option');
    opt.value = rf.key;
    opt.textContent = rf.label;
    sel.appendChild(opt);
  });

  var inp = document.createElement('input');
  inp.type = 'number';
  inp.style.cssText = 'flex:1;font-size:13px;padding:4px 8px';
  inp.min = 0;
  inp.step = 0.1;

  function detectCurrentKey() {
    for (var i=0;i<refreshGroupFields.length;i++) {
      if (item[refreshGroupFields[i].key] !== undefined) return refreshGroupFields[i].key;
    }
    return 'refreshtimesec';
  }
  var curKey = detectCurrentKey();
  sel.value = curKey;
  inp.value = item[curKey] !== undefined ? item[curKey] : 1;

  sel.onchange = function() {
    refreshGroupFields.forEach(function(rf){ delete item[rf.key]; });
    item[sel.value] = parseFloat(inp.value)||1;
    markDirty();
  };
  inp.oninput = function() {
    item[sel.value] = parseFloat(this.value)||0;
    markDirty();
  };

  wrap.appendChild(sel);
  wrap.appendChild(inp);
  row.appendChild(wrap);
  panel.appendChild(row);
}

function addField(panel, item, fieldDef, typeKey) {
  var row = document.createElement('div');
  row.className = 'field-row';

  var lbl = document.createElement('label');
  lbl.innerHTML = escH(fieldDef.name) + (fieldDef.required ? ' <span class="required-star">*</span>' : '');
  row.appendChild(lbl);

  var ftype = fieldDef.type;
  var val = item[fieldDef.name];

  if (ftype === 'Bool') {
    var inp = document.createElement('input');
    inp.type = 'checkbox';
    inp.checked = !!val;
    inp.onchange = function() { item[fieldDef.name] = this.checked; markDirty(); };
    row.appendChild(inp);
  } else if (fieldDef.allowedValues && fieldDef.allowedValues.length) {
    var sel = document.createElement('select');
    sel.style.cssText = 'font-size:13px;width:100%;padding:4px 8px';
    if (!fieldDef.required) {
      var emptyOpt = document.createElement('option');
      emptyOpt.value = '';
      emptyOpt.textContent = '— select —';
      sel.appendChild(emptyOpt);
    }
    fieldDef.allowedValues.forEach(function(av) {
      var opt = document.createElement('option');
      opt.value = av;
      opt.textContent = av;
      if (String(val).toUpperCase() === av.toUpperCase() || val === av) opt.selected = true;
      sel.appendChild(opt);
    });
    if (val !== undefined) sel.value = val;
    sel.onchange = function() { item[fieldDef.name] = this.value; markDirty(); };
    row.appendChild(sel);
  } else if (ftype === 'UInt' || ftype === 'Float' || ftype === 'Number') {
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.style.cssText = 'font-size:13px;width:100%;padding:4px 8px';
    if (fieldDef.min !== undefined && fieldDef.min !== null) inp.min = fieldDef.min;
    if (fieldDef.max !== undefined && fieldDef.max > 0) inp.max = fieldDef.max;
    if (ftype === 'Float' || ftype === 'Number') inp.step = 'any';
    inp.value = val !== undefined ? val : (fieldDef.default !== undefined ? fieldDef.default : '');
    inp.oninput = function() {
      var v = ftype==='UInt' ? parseInt(this.value) : parseFloat(this.value);
      if (!isNaN(v)) item[fieldDef.name] = v;
      markDirty();
    };
    row.appendChild(inp);
  } else if (ftype === 'HardwarePin') {
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.style.cssText = 'font-size:13px;width:100%;padding:4px 8px';
    inp.placeholder = 'GPIO pin number';
    inp.value = val !== undefined ? val : '';
    inp.oninput = function() {
      var v = parseInt(this.value);
      if (!isNaN(v)) item[fieldDef.name] = v;
      markDirty();
    };
    var note = document.createElement('div');
    note.className = 'field-note';
    note.textContent = 'GPIO pin number (negative = inverted)';
    row.appendChild(inp);
    row.appendChild(note);
  } else if (ftype === 'HexBytes') {
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.style.cssText = 'font-family:var(--font-mono);font-size:13px;width:100%;padding:4px 8px';
    inp.placeholder = 'e.g. 3C or 28:61:64:35:1B:71:C1:40';
    inp.value = val !== undefined ? val : '';
    inp.oninput = function() { item[fieldDef.name] = this.value; markDirty(); };
    row.appendChild(inp);
  } else if (ftype === 'UID') {
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.style.cssText = 'font-size:13px;width:100%;padding:4px 8px;font-family:var(--font-mono)';
    inp.maxLength = fieldDef.maxLength || 8;
    inp.placeholder = 'unique id (max 8 chars)';
    inp.value = val !== undefined ? val : '';
    inp.oninput = function() { 
      item[fieldDef.name] = this.value; 
      markDirty(); 
      renderSidebar();
    };
    row.appendChild(inp);
  } else {
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.style.cssText = 'font-size:13px;width:100%;padding:4px 8px';
    inp.value = val !== undefined ? String(val) : '';
    inp.placeholder = fieldDef.default !== undefined ? String(fieldDef.default) : '';
    inp.oninput = function() { item[fieldDef.name] = this.value; markDirty(); };
    row.appendChild(inp);
  }

  panel.appendChild(row);
}

function addGenericField(panel, item, key) {
  var row = document.createElement('div');
  row.className = 'field-row';
  var lbl = document.createElement('label');
  lbl.textContent = key;
  lbl.style.color = 'var(--color-text-warning)';
  row.appendChild(lbl);
  var val = item[key];
  if (typeof val === 'boolean') {
    var inp = document.createElement('input');
    inp.type = 'checkbox';
    inp.checked = val;
    inp.onchange = function() { item[key] = this.checked; markDirty(); };
    row.appendChild(inp);
  } else if (typeof val === 'number') {
    var inp = document.createElement('input');
    inp.type = 'number';
    inp.style.cssText = 'font-size:13px;width:100%;padding:4px 8px';
    inp.value = val;
    inp.oninput = function() { item[key] = parseFloat(this.value)||0; markDirty(); };
    row.appendChild(inp);
  } else if (typeof val === 'object') {
    var ta = document.createElement('textarea');
    ta.style.cssText = 'font-family:var(--font-mono);font-size:11px;width:100%;padding:4px 8px;min-height:50px';
    ta.value = JSON.stringify(val, null, 2);
    ta.oninput = function() {
      try { item[key] = JSON.parse(this.value); this.style.borderColor=''; } 
      catch(e) { this.style.borderColor='var(--color-border-danger)'; }
      markDirty();
    };
    row.appendChild(ta);
  } else {
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.style.cssText = 'font-size:13px;width:100%;padding:4px 8px';
    inp.value = val !== undefined ? String(val) : '';
    inp.oninput = function() { item[key] = this.value; markDirty(); };
    row.appendChild(inp);
  }
  panel.appendChild(row);
}

function renderRawFields(panel, item, skip) {
  Object.keys(item).forEach(function(k) {
    if (skip.indexOf(k) >= 0) return;
    addGenericField(panel, item, k);
  });
}

function markDirty() {
  dirty = true;
  setStatus('Unsaved changes', true);
  updateJsonPanel();
}

function updateJsonPanel() {
  if (!jsonOpen) return;
  var ta = document.getElementById('json-textarea');
  if (selectedIdx >= 0 && selectedIdx < cfg.length) {
    ta.value = JSON.stringify(cfg[selectedIdx], null, 2);
  } else {
    ta.value = JSON.stringify(cfg, null, 2);
  }
}

function escH(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function populateTypeSelect() {
  var sel = document.getElementById('add-type-select');
  rootTypeKeys.forEach(function(k) {
    var opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k + (typeDescriptions[k] ? ' – ' + typeDescriptions[k] : '');
    sel.appendChild(opt);
  });
}

document.getElementById('add-btn').onclick = function() {
  var typeKey = document.getElementById('add-type-select').value;
  var newUid = typeKey.toLowerCase() + '_' + (cfg.length+1);
  var newItem = {uid: newUid, type: typeKey};
  var sDef = schemaForType(typeKey);
  if (sDef) {
    (sDef.fields||[]).forEach(function(f) {
      if (['disabled','uid','note','type'].indexOf(f.name)>=0) return;
      if (f.type === 'OneOfGroup') {
        newItem['refreshtimesec'] = 1;
      } else if (f.required && f.default !== undefined && f.default !== '') {
        newItem[f.name] = f.default;
      }
    });
  }
  cfg.push(newItem);
  selectDevice(cfg.length - 1);
  setStatus('Added ' + typeKey + ' device', true);
};

document.getElementById('delete-btn').onclick = function() {
  if (selectedIdx < 0 || selectedIdx >= cfg.length) return;
  var uid = cfg[selectedIdx].uid || selectedIdx;
  if (!confirm('Delete device "' + uid + '"?')) return;
  cfg.splice(selectedIdx, 1);
  selectedIdx = Math.min(selectedIdx, cfg.length-1);
  renderSidebar();
  renderForm();
  updateJsonPanel();
  setStatus('Deleted device', true);
};

document.getElementById('save-btn').onclick = function() {
  dirty = false;
  setStatus('Saved — ' + cfg.length + ' devices', true);
  console.log('Config:', JSON.stringify(cfg, null, 2));
};

document.getElementById('json-toggle-btn').onclick = function() {
  jsonOpen = !jsonOpen;
  var jp = document.getElementById('json-panel');
  jp.classList.toggle('open', jsonOpen);
  this.textContent = jsonOpen ? '{ } hide JSON' : '{ } JSON';
  if (jsonOpen) updateJsonPanel();
};

document.getElementById('json-textarea').onchange = function() {
  try {
    var parsed = JSON.parse(this.value);
    if (selectedIdx >= 0 && selectedIdx < cfg.length) {
      cfg[selectedIdx] = parsed;
      renderSidebar();
      renderForm();
      markDirty();
    }
    this.style.borderColor = '';
  } catch(e) {
    this.style.borderColor = 'var(--color-border-danger)';
  }
};

populateTypeSelect();
renderSidebar();
selectDevice(cfg.length > 0 ? 0 : -1);
setStatus('Loaded ' + cfg.length + ' devices', true);
</script>
